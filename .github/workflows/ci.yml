name: CI

# Gate for claude-kit: leak scrub (R5), shell lint, manifest + symlink integrity.
# ubuntu-latest ships bash, jq, and shellcheck preinstalled — no setup steps needed.
#
# Security posture: read-only GITHUB_TOKEN, third-party actions pinned to a full
# commit SHA (tags are mutable), and checkout does not persist credentials since
# no step pushes back to the repo.

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this workflow only reads the repo. Set at the top level so it
# is the ceiling for every job.
permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Pinned to the v7.0.0 commit SHA — a moved tag can't swap the action out.
      # Bump the SHA and the trailing comment together when upgrading.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # R5: the committed leak-check must pass before anything reaches main.
      - name: Scrub check (personal-data leak gate)
        run: ./scripts/scrub-check.sh

      # Lint every shell script. Hooks are security-sensitive (force-push guard),
      # so warnings+errors fail; info/style findings stay advisory.
      - name: Shellcheck
        run: |
          shellcheck --severity=warning \
            install.sh \
            scripts/*.sh \
            hooks/*.sh

      # Manifests are load-bearing (plugin discovery). A malformed one breaks
      # install silently, so validate every tracked JSON parses.
      - name: Validate JSON manifests
        run: |
          fail=0
          while IFS= read -r f; do
            if ! jq empty "$f"; then
              echo "::error file=$f::invalid JSON"
              fail=1
            fi
          done < <(git ls-files '*.json')
          exit "$fail"

      # hooks-plugin/hooks/*.sh are relative symlinks into ../../hooks/. A dangling
      # one silently disables the corresponding hook, so assert they all resolve.
      - name: Verify hook symlinks resolve
        run: |
          fail=0
          for l in hooks-plugin/hooks/*.sh; do
            if [ -L "$l" ] && [ ! -e "$l" ]; then
              echo "::error file=$l::dangling symlink"
              fail=1
            fi
          done
          exit "$fail"
